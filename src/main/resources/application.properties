# Fisier de configurare pentru aplicatia Spring Boot CineVault
# Defineste conexiunea la baza de date
# @author Vasiliu Cristian
# @version 12 Ianuarie 2026

spring.application.name=CineVault

# CONFIGURARE BAZA DE DATE (H2)
# Definirea caii catre fisierul de baza de date local (stocare persistenta)
spring.datasource.url=jdbc:h2:file:./data/cinevault_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# STRATEGIE DE ACTUALIZARE SCHEMA
# Optiunea 'update' actualizeaza schema bazei de date fara a sterge inregistrarile existente la restart
spring.jpa.hibernate.ddl-auto=update

# SETARI DEBUG SI CONSOLA
# Activarea consolei H2 pentru vizualizarea bazei de date in browser
spring.h2.console.enabled=true
# Dezactivarea afisarii interogarilor SQL in consola pentru a pastra log-urile curate
spring.jpa.show-sql=false